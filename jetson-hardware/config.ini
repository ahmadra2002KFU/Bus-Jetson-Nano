# =============================================================================
# Al-Ahsa Smart Bus — Jetson edge device configuration
# =============================================================================
# Values that mirror the ns-3 simulation (scratch/smart-bus/smart-bus.cc) are
# marked (ns-3). Network transport has moved from LAN UDP/TCP to internet
# HTTP/WebSocket via a Cloudflare tunnel.

[network]
# Base URL of the internet-facing server (HTTPS recommended).
server_url = https://jetson.testingdomainzforprototypes.website

# Unique bus identifier (0..40 for the 41-bus fleet).
bus_id = 0

# Local network interface whose rx_bytes the DDoS detector watches.
# On the Jetson this is typically wlan0 (WiFi) or eth0.
interface = wlan0

[camera]
# Real IMX219 via nvarguscamerasrc (true) or dummy frames (false).
use_real_camera = true
device_index = 0
frame_width = 1280
frame_height = 720
fps = 30

[telegram]
# Secondary alerting channel. Leave tokens blank to disable.
enabled = true
bot_token = ${TELEGRAM_BOT_TOKEN}
chat_id = ${TELEGRAM_CHAT_ID}
alert_cooldown_s = 60

[thresholds]
# DDoS detection — lines 58-60 of smart-bus.cc
ddos_rate_bps = 15000000.0
ddos_loss_pct = 0.05
ddos_delay_s = 0.1
# GPS spoofing detection — lines 61-63 (applied server-side for public ingestion;
# kept here for local sanity checks and parity with the simulation)
gps_speed_ms = 22.2
gps_jump_m = 1000.0
gps_corridor_m = 1500.0
gps_streak_required = 3
detection_mode = any

[traffic]
gps_interval_s = 1.0
gps_packet_size = 200
cctv_packet_size = 1400
cctv_data_rate_kbps = 1000
ticket_packet_size = 256
ticket_min_interval_s = 6.0
ticket_max_interval_s = 20.0
ticket_min_burst = 1
ticket_max_burst = 3
ddos_check_interval_s = 10.0
warmup_time_s = 90.0

[reliability]
offline_db_path = ./logs/offline_queue.db
retry_max_backoff_s = 60.0
forensic_max_attempts = 10

[logging]
log_dir = ./logs
