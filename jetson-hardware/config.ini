# =============================================================================
# Al-Ahsa Smart Bus — Jetson Nano Deployment Configuration
# =============================================================================
# All values are derived from the ns-3 simulation source:
#   scratch/smart-bus/smart-bus.cc
# Adjust for real-world deployment as needed.

[network]
# Server IP for telemetry, CCTV, ticketing, forensic upload
server_ip = 192.168.1.100
# Bus identifier (0-40 for 41-bus fleet)
bus_id = 0
# LTE interface name on Jetson Nano
lte_interface = wwan0

[ports]
# smart-bus.cc lines 76-79
telemetry_port = 5000
cctv_port = 6000
ticket_port = 7000
forensic_port = 8000

[thresholds]
# DDoS detection thresholds — smart-bus.cc lines 58-60
ddos_rate_bps = 15000000.0
ddos_loss_pct = 0.05
ddos_delay_s = 0.1
# GPS spoofing detection thresholds — smart-bus.cc lines 61-63
gps_speed_ms = 22.2
gps_jump_m = 1000.0
gps_corridor_m = 1500.0
# Consecutive anomalous readings required — smart-bus.cc line 1015
gps_streak_required = 3
# Detection mode: "any" (1-of-N) or "voting" (2-of-N)
detection_mode = any

[traffic]
# GPS telemetry send interval in seconds
gps_interval_s = 1.0
# GPS packet size in bytes — smart-bus.cc line 471 (200B buffer)
gps_packet_size = 200
# CCTV packet size in bytes — smart-bus.cc line 1601
cctv_packet_size = 1400
# CCTV data rate — smart-bus.cc line 1600
cctv_data_rate_kbps = 1000
# Ticketing packet size — smart-bus.cc line 561/1625
ticket_packet_size = 256
# Forensic upload size (10 MB) — smart-bus.cc line 1286
forensic_upload_bytes = 10485760
# DDoS check interval in seconds — smart-bus.cc lines 1720-1725
ddos_check_interval_s = 10.0
# Warmup time before detection — smart-bus.cc line 64
warmup_time_s = 90.0

[camera]
# CSI camera device index on Jetson Nano
device_index = 0
# Frame width and height
frame_width = 1280
frame_height = 720
# Frames per second
fps = 30

[telegram]
# Telegram Bot API token (set via environment variable for security)
bot_token = ${TELEGRAM_BOT_TOKEN}
# Chat ID for alert delivery
chat_id = ${TELEGRAM_CHAT_ID}
# Cooldown between repeated alerts in seconds
alert_cooldown_s = 60

[route]
# Assigned route index (0-9), overridden by bus_id mapping in routes.py
route_index = 0
